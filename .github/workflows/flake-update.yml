name: "Flake Automated Update"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    # - name: Maximize build space
    #   uses: easimon/maximize-build-space@master
    #   with:
    #     build-mount-path: '/nix'
    #     remove-dotnet: 'true'
    #     remove-android: 'true'
    #     remove-haskell: 'true'
    #     remove-codeql: 'true'
    #     remove-docker-images: 'true'
    - name: Checkout
      uses: actions/checkout@main
    - name: Install nix
      uses: cachix/install-nix-action@master
      with:
        github_access_token: '${{ secrets.GITHUB_TOKEN }}'
    - name: Set nix daemon tmp path
      run: |
        sudo mkdir --parents /nix/tmp
        sudo chmod 777 /nix/tmp

        cat > override.conf <<EOF
        [Service]
        Environment="TMPDIR=/nix/tmp"
        EOF
        sudo mkdir /etc/systemd/system/nix-daemon.service.d/
        sudo mv override.conf /etc/systemd/system/nix-daemon.service.d/override.conf
        sudo systemctl daemon-reload
        sudo systemctl restart nix-daemon
    - name: Setup cachix
      uses: cachix/cachix-action@master
      with:
        name: antares0982
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - name: Nix flake update
      run: |
        nix flake update --commit-lock-file
    - name: nix build
      run: |
        nix build -L .#nixosConfigurations.nixos.config.system.build.toplevel --show-trace
    - name: Git push
      run: |
        git config --global pull.rebase false
        git pull
        git push
